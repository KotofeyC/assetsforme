<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2a90be">
  <title>Профессиональный каталог LV × NANOME</title>
  <meta name="description" content="Интерактивный профессиональный каталог нутрицевтиков LV и космецевтики NANOME.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Roboto:wght@400&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>:root {
  --accent:#3a1547; --accent-mid:#6d4187; --accent-light:#a880c0; --accent-deep:#2c0e38;
  --metal:#b78d3f; --metal-light:#e3c87f; --metal-soft:#f4ecd7;
  --canvas-a:#f8f4fb; --canvas-b:#f3edf8; --surface:#fff; --text:#281634; --muted:#564566;
  --border:#e2d8ef; --border-m:#c7b2dd; --shadow:0 22px 70px rgba(43,14,56,.14);
  --header-h:76px; --aside-w:285px; --ease:cubic-bezier(.22,.8,.2,1);
}

body[data-brand="lv"] {
  --accent:#2a90be; --accent-mid:#207da6; --accent-light:#73c2e2; --accent-deep:#134e69;
  --metal:#6f97aa; --metal-light:#cfe6f1; --metal-soft:#e9f4fa;
  --canvas-a:#f7fcff; --canvas-b:#eef7fc; --text:#173a4a; --muted:#3f6577;
  --border:#c7e6f5; --border-m:#a8d5ea; --shadow:0 22px 70px rgba(19,78,105,.14);
}

* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { margin:0; color:var(--text); background:var(--canvas-a); font-family:"Manrope",sans-serif; font-size:16px; -webkit-font-smoothing:antialiased; }
button,input { font:inherit; }
button,a { -webkit-tap-highlight-color:transparent; }
button { color:inherit; }
svg { width:22px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.skip-link { position:fixed; z-index:100; left:16px; top:-80px; padding:12px 16px; color:#fff; background:var(--accent-deep); border-radius:0 0 12px 12px; }
.skip-link:focus { top:0; }
:focus-visible { outline:3px solid var(--accent-light); outline-offset:3px; }

.topbar { height:var(--header-h); position:fixed; inset:0 0 auto; z-index:30; display:grid; grid-template-columns:var(--aside-w) 1fr auto; align-items:center; padding:0 24px; border-bottom:1px solid var(--border); background:color-mix(in srgb,var(--canvas-a) 90%,transparent); backdrop-filter:blur(18px); }
.brand-mark { width:150px; display:block; text-decoration:none; justify-self:start; }
.brand-logo { width:100%; height:auto; display:block; object-fit:contain; }
.brand-logo--lv { display:none; border-radius:6px; }
body[data-brand="lv"] .brand-logo--nanome { display:none; }
body[data-brand="lv"] .brand-logo--lv { display:block; }
.mode-switch { position:relative; padding:0; border:0; border-radius:0; background:transparent; box-shadow:none; }
.mode-tabs { display:grid; grid-template-columns:minmax(0,1fr) 42px minmax(0,1fr); align-items:stretch; gap:8px; }
.mode-tab { min-width:0; min-height:64px; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1.5px solid transparent; border-radius:14px; padding:14px 16px; text-align:center; cursor:pointer; transition:transform .15s,box-shadow .2s,background .2s,border-color .2s,color .2s; }
.mode-tab::after { content:""; width:0; height:3px; position:absolute; left:50%; bottom:8px; border-radius:999px; background:currentColor; opacity:.7; transform:translateX(-50%); transition:width .2s; }
.mode-tab:hover { transform:translateY(-1px); box-shadow:0 8px 22px rgba(44,14,56,.12); }
.mode-tab.active { color:#fff; box-shadow:0 14px 34px rgba(44,14,56,.18); }
.mode-tab.active::after { width:42%; background:rgba(255,255,255,.72); }
.mode-tab.cosmetics { color:#3a1547; border-color:#e2d8ef; background:#f6f1f9; }
.mode-tab.cosmetics.active { color:#fff; border-color:#3a1547; background:linear-gradient(150deg,#532864,#2c0e38); box-shadow:0 14px 34px rgba(44,14,56,.18),inset 0 0 0 1px rgba(227,200,127,.28); }
.mode-tab.bad { color:#2a90be; border-color:#a8d5ea; background:#e2f3fc; }
.mode-tab.bad.active { color:#fff; border-color:#2a90be; background:linear-gradient(150deg,#3aa6d0,#134e69); box-shadow:0 14px 34px rgba(19,78,105,.18),inset 0 0 0 1px rgba(207,230,241,.3); }
.mode-tab-name { font:700 15px/1.25 "Roboto Mono",monospace; letter-spacing:.45px; text-transform:uppercase; }
.mode-connector { min-height:42px; position:relative; display:grid; place-items:center; }
.mode-connector::before { content:""; height:1.5px; position:absolute; left:-8px; right:-8px; background:linear-gradient(90deg,#471e53,#2a90be); }
.mode-connector span { width:34px; height:34px; position:relative; display:grid; place-items:center; border:1px solid #c8ddeb; border-radius:50%; color:#2a90be; background:#fff; font-size:14px; font-weight:800; }
.top-actions { display:flex; gap:8px; justify-self:end; }
.icon-button { min-height:46px; display:flex; align-items:center; gap:9px; border:1px solid var(--border-m); border-radius:12px; padding:0 14px; color:var(--text); background:#fff; cursor:pointer; font-size:14px; font-weight:700; text-decoration:none; }
.order-link { color:#fff; border-color:var(--accent); background:var(--accent); }
.catalog-controls { display:grid; gap:8px; }
.catalog-controls .mode-switch { width:100%; }
.catalog-controls .mode-tabs { grid-template-columns:1fr; justify-items:stretch; }
.catalog-controls .mode-connector { width:100%; min-height:28px; }
.catalog-controls .mode-connector::before { width:1.5px; height:auto; inset:-7px auto; left:50%; background:linear-gradient(180deg,#471e53,#2a90be); transform:translateX(-50%); }
.catalog-controls .mode-connector span { width:30px; height:30px; margin:0 auto; font-size:13px; transform:rotate(90deg); }
.catalog-controls .mode-tab { width:100%; min-height:58px; padding:13px 12px; border-radius:12px; }
.catalog-controls .mode-tab-name { font-size:12px; }
.catalog-control-button { min-height:44px; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; border:1px solid var(--border-m); border-radius:12px; padding:0 12px; color:var(--text); background:rgba(255,255,255,.82); cursor:pointer; text-decoration:none; font-size:12px; font-weight:700; }
.catalog-control-button svg { width:18px; }
.catalog-control-button--order { color:#fff; border-color:var(--accent); background:var(--accent); }
.catalog-controls--mobile { display:none; }
.icon-button kbd,.contents kbd,.search-field kbd { border:1px solid var(--border); border-bottom-width:2px; padding:2px 5px; border-radius:5px; color:var(--muted); background:var(--surface); font:10px "Roboto Mono",monospace; }
.selection-button b { min-width:20px; height:20px; display:grid; place-items:center; border-radius:99px; color:#fff; background:var(--accent); font-size:10px; }

.reader { height:100dvh; padding-top:var(--header-h); display:grid; grid-template-columns:var(--aside-w) minmax(0,1fr); overflow:hidden; }
.contents { display:flex; flex-direction:column; justify-content:flex-start; gap:18px; min-height:0; padding:clamp(22px,3vh,34px) 24px 24px; border-right:1px solid var(--border); background:linear-gradient(160deg,var(--canvas-a),var(--canvas-b)); }
.eyebrow { margin:0 0 12px; color:var(--metal); font:700 12px/1.4 "Roboto Mono",monospace; letter-spacing:.08em; text-transform:uppercase; }
.contents h1 { margin:0; max-width:240px; font:700 clamp(28px,2.1vw,38px)/1.05 "Roboto Mono",monospace; letter-spacing:-.035em; text-transform:uppercase; }
body[data-brand="lv"] .contents h1 { font-size:clamp(24px,2.1vw,36px); line-height:1.05; }
.contents > div:first-child > p:last-child { margin:18px 0 0; max-width:230px; color:var(--muted); font-size:12px; line-height:1.55; }
.contents__nav { display:grid; gap:6px; margin:18px 0; overflow:auto; scrollbar-width:none; }
.contents__nav-title { margin:0 0 8px; color:var(--metal); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
.contents__nav button { min-height:62px; display:grid; grid-template-columns:26px 1fr; align-items:center; gap:10px; width:100%; border:1px solid transparent; border-radius:12px; padding:9px 11px; text-align:left; background:transparent; color:var(--muted); cursor:pointer; font-size:13px; }
.contents__nav button span:first-child { color:var(--metal); font-size:12px; font-weight:700; }
.contents__nav button b { display:block; color:inherit; font-size:14px; line-height:1.25; }
.contents__nav button b { font-family:"Roboto Mono",monospace; font-weight:700; letter-spacing:-.025em; text-transform:uppercase; }
.contents__nav button small { display:block; margin-top:4px; color:var(--muted); font-size:11px; }
.contents__nav button:hover,.contents__nav button[aria-current="page"] { color:var(--text); border-color:var(--border); background:rgba(255,255,255,.82); }
.contents__nav button[aria-current="page"] { box-shadow:inset 3px 0 var(--accent); }
.contents__nav .contents__overview { margin-top:5px; border-top:1px solid var(--border); border-radius:0 0 12px 12px; }
.partner-mark { width:210px; max-width:100%; flex:0 0 auto; margin-top:auto; }
.partner-mark img { width:100%; height:auto; display:block; object-fit:contain; }
body[data-brand="lv"] .partner-mark img { filter:hue-rotate(270deg) saturate(1.18) brightness(.92); }
.contents__help { color:var(--muted); font-size:10px; }
.contents__help > span { display:block; margin-bottom:7px; text-transform:uppercase; letter-spacing:.1em; }
.contents__help div { display:flex; align-items:center; gap:5px; }
.contents__help div span { margin-left:4px; }

.book { position:relative; min-width:0; overflow:hidden; isolation:isolate; background:#f5f5f7; }
.book::before { content:""; position:absolute; z-index:0; inset:0; pointer-events:none; background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,0) 32%); }
body[data-brand="nanome"] .book { background:radial-gradient(circle at 70% 0,rgba(216,196,226,.34),transparent 35%),#f7f4f8; }
body[data-brand="lv"] .book { background:radial-gradient(circle at 82% 3%,rgba(112,198,226,.18),transparent 34%),#f3f8fb; }
.ambient-liposome { width:clamp(240px,22vw,390px); height:auto; position:absolute; z-index:1; display:block; opacity:.17; pointer-events:none; user-select:none; mix-blend-mode:multiply; filter:saturate(.82); will-change:transform; }
.ambient-liposome--north { top:-10%; left:-7%; animation:ambient-liposome-clockwise 88s linear infinite; }
.ambient-liposome--south { right:-6%; bottom:-13%; animation:ambient-liposome-counter 104s linear infinite; }
body[data-brand="nanome"] .ambient-liposome { filter:saturate(.88); }
body[data-brand="lv"] .ambient-liposome { opacity:.155; filter:hue-rotate(-65deg) saturate(1.05); }
.book__track { height:100%; position:relative; z-index:2; display:flex; transition:transform .7s var(--ease); will-change:transform; }
@keyframes ambient-liposome-clockwise { to { transform:rotate(360deg); } }
@keyframes ambient-liposome-counter { to { transform:rotate(-360deg); } }
.spread { flex:0 0 100%; min-width:0; height:100%; position:relative; padding:clamp(24px,3.4vw,54px) clamp(56px,6vw,94px) 62px; overflow:hidden; }
.spread__folio { display:none; }

.cover-spread { display:grid; grid-template-columns:minmax(0,.88fr) minmax(340px,1.12fr); gap:5vw; align-items:center; }
.cover-copy { position:relative; z-index:2; }
.cover-copy h2 { max-width:640px; margin:0; font:700 clamp(42px,5.2vw,76px)/.93 "Roboto Mono",monospace; letter-spacing:-.055em; text-transform:uppercase; }
body[data-brand="lv"] .cover-copy h2 { font-size:clamp(38px,4.7vw,68px); line-height:.96; }
.cover-copy h2 em { color:var(--accent); font-style:normal; }
.cover-copy > p:not(.eyebrow) { max-width:540px; margin:25px 0 28px; color:var(--muted); font-size:clamp(13px,1.25vw,17px); line-height:1.55; }
.cover-actions { display:flex; flex-wrap:wrap; gap:10px; }
.button { min-height:46px; display:inline-flex; align-items:center; justify-content:center; gap:8px; border:1px solid var(--border-m); border-radius:12px; padding:0 18px; text-decoration:none; cursor:pointer; font-size:12px; font-weight:650; }
.button--primary { color:#fff; border-color:var(--accent); background:var(--accent); box-shadow:0 10px 30px color-mix(in srgb,var(--accent) 26%,transparent); }
.button--ghost { color:var(--text); background:rgba(255,255,255,.66); }
.cover-visual { height:min(65vh,650px); position:relative; display:grid; place-items:center; }
.cover-halo { width:min(43vw,560px); aspect-ratio:1; position:absolute; border-radius:50%; background:radial-gradient(circle,color-mix(in srgb,var(--accent-light) 28%,#fff),color-mix(in srgb,var(--metal-soft) 50%,transparent) 52%,transparent 70%); filter:blur(2px); }
.cover-product { position:relative; z-index:2; width:min(75%,430px); height:78%; object-fit:contain; filter:drop-shadow(0 30px 24px rgba(31,13,41,.2)); transform:rotate(2deg); }
.cover-note { position:absolute; z-index:3; right:0; bottom:8%; width:180px; padding:14px; border:1px solid rgba(255,255,255,.8); border-radius:14px; background:rgba(255,255,255,.72); backdrop-filter:blur(14px); box-shadow:var(--shadow); font-size:11px; line-height:1.45; }
.cover-note strong { display:block; margin-bottom:4px; color:var(--accent); font-size:24px; }

.guide-spread { display:grid; grid-template-columns:.72fr 1.28fr; gap:6vw; align-items:center; }
.section-heading h2 { margin:0; max-width:520px; font:700 clamp(34px,4vw,60px)/.98 "Roboto Mono",monospace; letter-spacing:-.045em; text-transform:uppercase; }
body[data-brand="lv"] .section-heading h2 { font-size:clamp(32px,3.6vw,54px); }
.section-heading p:last-child { max-width:460px; margin:20px 0 0; color:var(--muted); font-size:14px; line-height:1.6; }
.guide-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
.guide-card { min-height:170px; position:relative; display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between; border:1px solid var(--border); border-radius:18px; padding:20px; background:rgba(255,255,255,.7); box-shadow:0 12px 34px rgba(35,20,44,.05); }
.guide-card span { color:var(--metal); font:11px "Roboto Mono",monospace; }
.guide-card h3 { margin:20px 0 8px; font-size:17px; line-height:1.18; }
.guide-card h3,.category-card h3,.end-step h3,.search-results-head h2,.search-result h3 { font-family:"Roboto Mono",monospace; font-weight:700; letter-spacing:-.025em; text-transform:uppercase; }
.guide-card p { margin:0; color:var(--muted); font-size:11px; line-height:1.5; }
.guide-card button { position:absolute; inset:0; border:0; border-radius:inherit; background:transparent; cursor:pointer; }
.guide-card:hover { border-color:var(--accent-light); transform:translateY(-2px); }

.category-spread { display:grid; grid-template-rows:auto 1fr; gap:24px; }
.spread-header { display:flex; align-items:end; justify-content:space-between; gap:24px; }
.spread-header h2 { margin:0; font:700 clamp(30px,3.4vw,50px)/1 "Roboto Mono",monospace; letter-spacing:-.04em; font-kerning:none; font-variant-ligatures:none; text-transform:uppercase; }
body[data-brand="lv"] .spread-header h2 { font-size:clamp(28px,3vw,46px); }
body[data-brand="nanome"] .spread-header h2 { color:var(--accent-deep); }
body[data-brand="lv"] .spread-header h2 { color:#168bb3; }
.spread-header p { max-width:420px; margin:0; color:var(--muted); font-size:15px; line-height:1.5; }
.category-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; align-content:stretch; }
.category-card { position:relative; display:flex; flex-direction:column; justify-content:space-between; min-height:0; border:1px solid var(--border); border-radius:20px; padding:20px; overflow:hidden; background:rgba(255,255,255,.72); }
.category-card::after { content:""; width:140px; aspect-ratio:1; position:absolute; right:-50px; bottom:-60px; border-radius:50%; background:var(--metal-soft); }
.category-card small { color:var(--metal); font:10px "Roboto Mono",monospace; }
.category-card h3 { max-width:230px; margin:18px 0 8px; font-size:18px; line-height:1.1; }
.category-card p { max-width:250px; margin:0; color:var(--muted); font-size:11px; line-height:1.45; }
.category-card button { width:max-content; min-height:40px; position:relative; z-index:2; margin-top:18px; border:0; border-bottom:1px solid var(--accent); padding:0; color:var(--accent); background:transparent; cursor:pointer; font-size:11px; font-weight:700; }

.products-spread { display:grid; grid-template-rows:auto minmax(0,1fr); gap:16px; }
.products-spread .spread-header h2 { max-width:680px; font-size:clamp(23px,2.25vw,35px); letter-spacing:.045em; }
.product-pair { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); grid-template-rows:repeat(2,minmax(0,1fr)); gap:18px; min-height:0; }
.product-card { min-width:0; min-height:0; display:grid; grid-template-columns:minmax(148px,40%) minmax(0,60%); grid-template-rows:1fr; position:relative; border:1px solid color-mix(in srgb,var(--border) 72%,#d7d7dc); border-radius:24px; overflow:visible; background:rgba(255,255,255,.96); box-shadow:0 1px 2px rgba(20,20,24,.04),0 14px 38px rgba(20,20,24,.045); }
.product-card__visual { min-width:0; min-height:0; position:relative; display:grid; place-items:center; margin:12px; padding:14px; overflow:hidden; border:0; border-radius:18px; color:inherit; background:#f5f5f7; cursor:pointer; }
.product-card__visual::before { display:none; }
.product-card__visual img { display:block; width:auto; height:auto; max-width:100%; max-height:100%; min-width:0; min-height:0; position:relative; object-fit:contain; object-position:center; border-radius:0; filter:none; transition:opacity .2s ease; }
body[data-brand="nanome"] .product-card__visual { margin:8px; padding:16px; overflow:visible; background:#f5f0f6; }
body[data-brand="nanome"] .product-card__visual img { width:100%; height:100%; max-width:100%; max-height:100%; position:relative; inset:auto; object-fit:contain; object-position:center; filter:drop-shadow(0 14px 16px rgba(58,21,71,.10)); transform:none; }
body[data-brand="lv"] .product-card__visual { padding:20px; background:#f2f8fb; }
body[data-brand="lv"] .product-card__visual img { max-width:92%; max-height:92%; filter:drop-shadow(0 14px 14px rgba(20,50,63,.12)); }
.product-badge { width:88px; height:88px; position:absolute; z-index:4; top:-26px; right:auto; left:-26px; display:block; pointer-events:none; filter:drop-shadow(0 8px 14px rgba(58,21,71,.18)); animation:nanome-badge-spin 20s linear infinite; transform-origin:center; }
.product-badge svg { width:100%; height:100%; display:block; overflow:visible; }
.product-badge text,.product-badge textPath { fill:#e7daeb; stroke:none; }
.product-badge--long { width:104px; height:104px; }
.product-badge--detail { width:118px; height:118px; top:4px; right:auto; left:4px; }
.product-badge--detail.product-badge--long { width:136px; height:136px; }
@keyframes nanome-badge-spin { to { transform:rotate(360deg); } }
@media (prefers-reduced-motion:reduce) { .product-badge { animation:none; } }
.lv-ribbon { --ribbon-label-length:89px; width:30px; height:186px; position:absolute; z-index:4; top:0; left:0; display:block; overflow:hidden; pointer-events:none; }
.lv-ribbon > span { width:var(--ribbon-label-length); height:24px; position:absolute; top:12px; left:3px; display:flex; align-items:center; justify-content:center; color:#fff; font:400 16px/24px "Roboto",Arial,sans-serif; white-space:nowrap; transform:rotate(-90deg) translateX(-100%); transform-origin:top left; }
.lv-ribbon--bestseller { --ribbon-label-length:101px; background:linear-gradient(180deg,rgb(187,107,217) 10%,rgba(242,153,70,.45) 66%,rgba(242,153,74,0) 96%); }
.lv-ribbon--new { --ribbon-label-length:89px; background:linear-gradient(180deg,rgb(37,173,96) 10%,rgba(242,211,75,.28) 83%,rgba(242,211,75,0) 96%); }
.lv-ribbon--kids { --ribbon-label-length:156px; background:linear-gradient(180deg,rgb(252,114,28) 10%,rgba(242,211,75,.28) 83%,rgba(242,211,75,0) 96%); }
.lv-ribbon--detail { top:0; left:0; }
.product-card__info { min-width:0; display:flex; flex-direction:column; padding:18px 18px 16px 6px; }
.product-card__meta { display:flex; justify-content:space-between; gap:10px; color:var(--metal); font:9px "Roboto Mono",monospace; letter-spacing:.06em; text-transform:uppercase; }
.product-card h3 { margin:0 0 10px; font:700 clamp(16px,1vw,18px)/1.2 "Roboto Mono",monospace; letter-spacing:.01em; font-kerning:none; font-variant-ligatures:none; text-transform:uppercase; }
.product-name__core { text-transform:uppercase; }
.product-name__descriptor { font-family:"Manrope",sans-serif; font-weight:600; letter-spacing:-.015em; text-transform:none; }
.product-card .product-name__descriptor { display:inline; font-size:.92em; }
.product-card .product-name__descriptor--translation { display:block; margin-top:2px; font-size:.86em; }
.product-claims { display:flex; flex-wrap:wrap; gap:5px; margin:0 0 8px; padding:0; list-style:none; }
.product-claims li { min-width:0; max-width:100%; min-height:25px; display:inline-flex; align-items:center; border:1px solid color-mix(in srgb,var(--accent) 24%,var(--border)); border-radius:99px; padding:3px 8px; color:var(--accent); background:color-mix(in srgb,var(--canvas-a) 78%,#fff); font-size:11px; font-weight:700; line-height:1.2; overflow-wrap:anywhere; }
.product-card { transition:border-color .22s ease,box-shadow .22s ease,background-color .22s ease; }
.product-card:hover { border-color:var(--border-m); box-shadow:0 1px 2px rgba(20,20,24,.04),0 22px 50px rgba(20,20,24,.09); }
.product-card__summary { display:grid; gap:10px; }

  function skinDetails(product) {
    if (product.brand !== "nanome") return { core:clean(field(product.raw,["кому подходит"])), note:"" };

    const lineParts = raw.split(/\n+/).map(clean).filter(Boolean);
    if (lineParts.length > 1) return { core:lineParts[0], note:lineParts.slice(1).join(" ") };
    const sentence = raw.match(/^(.+?)\.\s*((?:Не подойдет|Для сухого).+)$/i);
    if (sentence) return { core:clean(sentence[1]), note:clean(sentence[2]) };

    if (inclusive) return { core:clean(inclusive[1]), note:clean(inclusive[2]) };
    return { core:clean(raw), note:"" };

  function labelledPart(text, label, nextLabel = "") {
    const source = String(text || "").replace(/\r/g, "");
    const start = source.toLowerCase().indexOf(label.toLowerCase());
    if (start < 0) return "";
    const contentStart = start + label.length;
    const rest = source.slice(contentStart);
    const end = nextLabel ? rest.toLowerCase().indexOf(nextLabel.toLowerCase()) : -1;
    return clean((end >= 0 ? rest.slice(0,end) : rest).replace(/^\s*:\s*/, "").replace(/[.\s]+$/, ""));
  }

  function procedureItems(value) {
    const source = String(value || "").replace(/\r/g, "").trim();
    const immediateMatch = source.match(/Сразу после процедуры:\s*([\s\S]*?)(?=\nДомашний уход:|$)/i);
    const homeIndex = source.toLowerCase().indexOf("домашний уход:");
    const home = homeIndex >= 0 ? source.slice(homeIndex + "домашний уход:".length).trim() : "";
    const items = home ? home.split(/\n?\s*•\s*/).map(clean).filter(Boolean) : [];
    return {
      immediate:clean(immediateMatch?.[1] || ""),
      home:items.map(item => {
        const parts = item.split(/\s+—\s+/);
        return { procedure:clean(parts.shift()), recommendation:clean(parts.join(" — ")) };
      })
    };
  }

  function homeCareRecommendation(value) {
    let detail = clean(value).replace(/[.\s]+$/, "");
    detail = detail
      .replace(/^назначить\s+в\s+домашний\s+уход(?:\s+после\s+процедуры)?\s*[:—-]?\s*/i, "")
      .replace(/^после\s+процедуры\s*[:—-]?\s*/i, "");
    if (!detail) return "Назначить в домашний уход после процедуры.";
    return `Назначить в домашний уход после процедуры: ${detail.charAt(0).toLowerCase()}${detail.slice(1)}.`;
  }

  function immediateProcedureNames(value) {
    const source = clean(value).toLowerCase();
    const protocols = [
      ["lpg", "LPG-массаж лица"],
      ["smas", "SMAS-лифтинг HIFU"],
      ["микроигольчат", "Микроигольчатый RF"],
      ["микроток", "Микротоковая терапия"],
      ["пигментн", "Удаление пигментных пятен"],
      ["сосуд", "Удаление сосудов"],
      ["уз-пилинг", "УЗ-пилинг"]
    ];
    return protocols.filter(([needle]) => source.includes(needle)).map(([,label]) => label);
  }

  function homeProcedureName(value) {
    let name = clean(value).replace(/^После\s+/i, "");
    name = name
      .replace(/^SMAS-лифтинга(?:\s+HIFU)?$/i, "SMAS-лифтинг HIFU")
      .replace(/^микроигольчатого\s+RF$/i, "Микроигольчатый RF")
      .replace(/^LPG-массажа\s+лица$/i, "LPG-массаж лица")
      .replace(/^микротоковой\s+терапии$/i, "Микротоковая терапия")
      .replace(/^удаления/i, "Удаление")
      .replace(/,\s*сосудов/i, ", удаление сосудов")
      .replace(/УЗ-пилинга/gi, "УЗ-пилинг");
    return name;
  }

  function toggleComparison(id) {
    if (brand !== "nanome") return;
    const product = products.find(item=>item.id===id);
    if (!product) return;
    if (comparison.includes(id)) comparison = comparison.filter(item=>item!==id);
    else {
      const category = comparisonCategory(product).id;
      const categoryCount = comparison.map(item=>products.find(product=>product.id===item)).filter(Boolean).filter(product=>comparisonCategory(product).id===category).length;
      if (categoryCount >= 3) { showToast("В одной категории можно сравнить до трёх продуктов"); return; }
      comparison.push(id);
    }
    updateComparisonBar();
    renderBook(); renderMobile();
    if (els.compare.open) {
      els.compare.close();
      if (comparison.length) openComparison();

  function comparisonList(value, splitCommas = false) {
    const pattern = splitCommas ? /\n+|;\s*|,\s*/ : /\n+|;\s*|\s*•\s*/;
    return String(value || "").replace(/\r/g, "").split(pattern).map(clean).filter(Boolean).map(sentenceCase);
  }

  function sentenceCase(value) {
    return clean(value).replace(/^([^\p{L}]*)(\p{Ll})/u,(_,prefix,letter)=>prefix+letter.toLocaleUpperCase("ru-RU"));
  }

  function comparisonCell(value, mode = "text") {
    const source = sentenceCase(value) || "—";
    if (mode === "lead") return `<p class="comparison-lead">${esc(source)}</p>`;
    if (mode === "list" || mode === "actives") {
      const items = comparisonList(value, mode === "actives");
      return items.length > 1 ? `<ul class="comparison-list">${items.map(item=>`<li>${esc(item)}</li>`).join("")}</ul>` : esc(source);
    }
    return esc(source);
  }

  function comparisonRowsFor(list) {
    const candidateRows = [
      { label:"Главное отличие", getter:product=>exactField(product.raw,["Главное отличие внутри категории"]) || nanomeComparisonDifferences[product.sku] || productClaims(product).join(" · "), mode:"lead", always:true },
      { label:"Для чего", getter:product=>product.task || product.description, mode:"actives" },
      { label:"Тип кожи", getter:product=>skinDetails(product).core, mode:"actives" },
      { label:"Этап ухода", getter:product=>field(product.raw,["этап ухода","этап"]) },
      { label:"Ключевые активы", getter:product=>product.actives, mode:"actives" },
      { label:"В кабинете", getter:product=>labelledPart(field(product.raw,["профессиональные задачи"]),"Применение в кабинете"), mode:"list" },
      { label:"После процедур и домой", getter:product=>field(product.raw,["после процедур"]), mode:"list" },
      { label:"Объём и цена", getter:product=>`${product.format || "—"} · ${money(product.price)}` }
    ];
    return candidateRows.filter(row => row.always || new Set(list.map(product=>clean(row.getter(product)).toLowerCase())).size > 1);
  }

  function comparisonGroupMarkup(group,list) {
    const heading = `<header class="comparison-category__head"><p>Категория</p><h3>${esc(group.name)}</h3><span>${productCount(list.length)}</span></header>`;
    if (list.length < 2) {
      const product = list[0];
      return `<section class="comparison-category comparison-category--pending">${heading}<article><img src="${esc(product.image)}" alt=""><div><strong>${esc(product.name)}</strong><p>Добавьте ещё один продукт из категории «${esc(group.name)}», чтобы увидеть отличия.</p><button type="button" data-compare-product="${esc(product.id)}">Убрать из сравнения</button></div></article></section>`;
    }
    const rows = comparisonRowsFor(list);
    const productKeys = list.map((product,index)=>`<article><img src="${esc(product.image)}" alt=""><div><small>0${index+1}</small><strong>${esc(product.name)}</strong><button type="button" data-compare-product="${esc(product.id)}">Убрать</button></div></article>`).join("");
    const mobileRows = rows.map(row=>`<section class="comparison-mobile__factor" data-comparison-row="${esc(row.label)}"><h3>${esc(row.label)}</h3>${list.map((product,index)=>`<div class="comparison-mobile__value"><span>0${index+1}</span><div>${comparisonCell(row.getter(product),row.mode)}</div></div>`).join("")}</section>`).join("");
    const table = `<table class="comparison-table"><thead><tr><th scope="col">Фактор отличия</th>${list.map(product=>`<th scope="col"><img src="${esc(product.image)}" alt="${esc(product.name)}"><strong>${esc(product.name)}</strong><button type="button" data-compare-product="${esc(product.id)}">Убрать</button></th>`).join("")}</tr></thead><tbody>${rows.map(row=>`<tr data-comparison-row="${esc(row.label)}"><th scope="row">${esc(row.label)}</th>${list.map(product=>`<td>${comparisonCell(row.getter(product),row.mode)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    return `<section class="comparison-category">${heading}${table}<div class="comparison-mobile"><div class="comparison-mobile__products">${productKeys}</div>${mobileRows}</div></section>`;
  }

  function openComparison() {
    const list = comparison.map(id=>products.find(item=>item.id===id)).filter(Boolean);
    if (!list.length) { showToast("Добавьте продукты для сравнения"); return; }
    const groups = collections.nanome.map(group=>({group,list:list.filter(product=>comparisonCategory(product).id===group.id)})).filter(item=>item.list.length);
    $("[data-compare-title]").textContent = groups.length === 1 ? groups[0].group.name : "Выбранные категории";
    els.compareContent.innerHTML = groups.map(item=>comparisonGroupMarkup(item.group,item.list)).join("");
    bindDynamic(els.compareContent);
    els.compare.showModal();
  }


  function renderSearch(query = "") {
    const q = clean(query).toLowerCase().replace(/ё/g,"е");
    const job = config[brand].scenarios.find(item=>item.id===activeSearchJob);
    const context = searchContexts[brand].find(item=>item.id===activeSearchContext);
    const matchesDefinition = (product, definition) => !definition || (definition.match ? definition.match(product) : definition.terms.some(term=>product.search.includes(term.toLowerCase().replace(/ё/g,"е"))));
    const source = q ? filteredProducts(q) : products;
    const filtered = source.filter(product=>matchesDefinition(product,job) && matchesDefinition(product,context));
    const list = q || job || context ? filtered : products.slice(0,10);
    $("[data-search-count]").textContent = productCount(list.length);
    $("[data-search-title]").textContent = q || job || context ? "Подходящие продукты" : "Можно начать отсюда";
    $$("[data-search-job]",els.searchScenarios).forEach(button=>button.setAttribute("aria-pressed",button.dataset.searchJob===activeSearchJob));
    $$("[data-search-context]",els.searchContexts).forEach(button=>button.setAttribute("aria-pressed",button.dataset.searchContext===activeSearchContext));
    $("[data-reset-search-filters]").disabled = !q && !job && !context;
    els.searchResults.innerHTML = list.length ? list.map(product => `<article class="search-result"><img src="${esc(product.image)}" alt=""><div><h3>${esc(product.name)}</h3><p>${esc(product.task || product.description)}</p></div><button type="button" data-open-product="${esc(product.id)}" aria-label="Открыть карточку">→</button></article>`).join("") : '<div class="selection-empty">Ничего не найдено. Попробуйте название задачи или актива.</div>';
    bindDynamic(els.searchResults);
  }

  function openSearch() {
    els.searchScenarios.innerHTML = config[brand].scenarios.map(item => `<button type="button" data-search-job="${esc(item.id)}" aria-pressed="${activeSearchJob===item.id}">${esc(item.name)}</button>`).join("");
    els.searchContexts.innerHTML = searchContexts[brand].map(item => `<button type="button" data-search-context="${esc(item.id)}" aria-pressed="${activeSearchContext===item.id}">${esc(item.name)}</button>`).join("");
    $("[data-search-context-title]").textContent = brand === "nanome" ? "Уточнить этап ухода" : "Уточнить формат";
    els.searchInput.placeholder = brand === "nanome" ? "Название, актив, состояние кожи или процедура…" : "Название, актив, запрос или совместимость…";
    renderSearch(); els.search.showModal(); setTimeout(()=>els.searchInput.focus(),50);
  }

  function renderMobile() {
    const c = config[brand];
    $("[data-mobile-hero]").innerHTML = `<div class="mobile-hero__copy">${brandLogoMarkup()}</div>`;
    $("[data-mobile-filters]").innerHTML = `<button type="button" data-collection="" aria-pressed="${!activeCollection&&!activeFilter}">Все продукты</button>${collections[brand].map(item=>`<button type="button" data-collection="${esc(item.id)}" aria-pressed="${activeCollection===item.id}">${esc(item.name)}</button>`).join("")}`;
    const list = visibleProducts();
    $("[data-mobile-count]").textContent = `${list.length} позиций`;
    $("[data-mobile-products]").innerHTML = list.map(productCard).join("");
    $("[data-mobile-end]").innerHTML = `<h2>Оформление через менеджера</h2><p>Форма откроется в новой вкладке. Выбранные позиции нужно указать в ней вручную.</p><a class="button" href="https://liposomalvitamins.ru/orderform" target="_blank" rel="noopener">Открыть форму заказа ↗</a>`;
    bindDynamic($(".mobile-catalog"));
  }

  function bindDynamic(root = document) {
    $$('[data-open-search]',root).forEach(el => el.onclick = openSearch);
    $$('[data-open-product]',root).forEach(el => el.onclick = () => { if (els.search.open) els.search.close(); openProduct(el.dataset.openProduct); });
    $$('[data-compare-product]',root).forEach(el => el.onclick = event => { event.stopPropagation(); toggleComparison(el.dataset.compareProduct); });
    $$('[data-filter]',root).forEach(el => el.onclick = () => setFilter(el.dataset.filter));
    $$('[data-collection]',root).forEach(el => el.onclick = () => setCollection(el.dataset.collection));
    $$('[data-clear-filter]',root).forEach(el => el.onclick = () => setFilter(""));
    $$('[data-page-jump]',root).forEach(el => el.onclick = () => goPage(el.dataset.pageJump));
    $$('[data-section-nav]',root).forEach(el => el.onclick = () => goSection(el.dataset.sectionNav));
  }

  function setBrand(nextBrand) {
    brand = nextBrand;
    activeFilter = ""; activeCollection = ""; activeSearchJob = ""; activeSearchContext = ""; currentPage = 0; comparison = [];
    document.body.dataset.brand = brand;
    document.documentElement.style.colorScheme = "light";
    $("meta[name=theme-color]").content = brand === "nanome" ? "#3a1547" : "#2a90be";
    $$('[data-switch-brand]').forEach(button => {
      const selected = button.dataset.switchBrand===brand;
      button.setAttribute("aria-selected",selected);
      button.classList.toggle("active",selected);
    });
    const c = config[brand];
    products = RAW[brand].map(row => normalize(row,brand));
    if(location.protocol!=="about:"){
      try{history.replaceState(null,"",`${location.pathname}?brand=${brand}`);}catch(_error){}
    }
    renderBook(); renderMobile(); renderSearch(); updateComparisonBar();
  }

  function showToast(message) {
    els.toast.textContent = message; els.toast.classList.add("is-visible");
    clearTimeout(showToast.timer); showToast.timer = setTimeout(()=>els.toast.classList.remove("is-visible"),2200);
  }

  els.prev.onclick = () => goPage(currentPage-1);
  els.next.onclick = () => goPage(currentPage+1);
  $$('[data-switch-brand]').forEach(button => button.onclick = () => setBrand(button.dataset.switchBrand));
  $$('[data-close-dialog]').forEach(button => button.onclick = () => button.closest("dialog").close());
  els.searchInput.addEventListener("input",event => renderSearch(event.target.value));
  els.searchScenarios.addEventListener("click",event => {
    const button = event.target.closest("[data-search-job]"); if (!button) return;
    activeSearchJob = activeSearchJob === button.dataset.searchJob ? "" : button.dataset.searchJob;
    renderSearch(els.searchInput.value);
  });
  els.searchContexts.addEventListener("click",event => {
    const button = event.target.closest("[data-search-context]"); if (!button) return;
    activeSearchContext = activeSearchContext === button.dataset.searchContext ? "" : button.dataset.searchContext;
    renderSearch(els.searchInput.value);
  });
  $("[data-reset-search-filters]").onclick = () => {
    activeSearchJob = ""; activeSearchContext = ""; els.searchInput.value = ""; renderSearch();
  };
  document.addEventListener("keydown",event => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase()==="k") { event.preventDefault(); openSearch(); return; }
    if ($$("dialog[open]").length || innerWidth <= 820) return;
    if (event.key === "ArrowLeft") goPage(currentPage-1);
    if (event.key === "ArrowRight" || event.key === " ") { event.preventDefault(); goPage(currentPage+1); }
  });
  $(".book").addEventListener("wheel",event => {
    if (innerWidth <= 820 || wheelLocked || Math.abs(event.deltaY)+Math.abs(event.deltaX)<10) return;
    event.preventDefault(); wheelLocked=true;
    goPage(currentPage + ((event.deltaY || event.deltaX)>0 ? 1 : -1));
    setTimeout(()=>wheelLocked=false,650);
  },{passive:false});
  $("[data-open-comparison]").onclick = openComparison;
  $("[data-clear-comparison]").onclick = () => { comparison=[]; updateComparisonBar(); renderBook(); renderMobile(); };
  [els.search,els.product,els.compare].forEach(dialog => dialog.addEventListener("click",event => {
    const rect=dialog.getBoundingClientRect();
    if (event.clientX<rect.left || event.clientX>rect.right || event.clientY<rect.top || event.clientY>rect.bottom) dialog.close();
  }));

  setBrand(brand);
})();
</script>
</body>
</html>
